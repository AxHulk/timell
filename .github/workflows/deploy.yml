name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy-to-vps:
    name: Синхронизация кода с веб-сервером
    runs-on: [self-hosted, linux, x64, production]

    steps:
      - name: 1. Клонирование репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Установка зависимостей
        run: npm install

      - name: 4. Сборка проекта
        run: npm run build

      - name: 5. Синхронизация файлов (rsync)
        run: |
          rsync -avz --delete \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude="node_modules/" \
            --exclude=".env" \
            ${{ github.workspace }}/dist/ /var/www/timell/dist/

      - name: 6. Исправление прав доступа
        run: |
          sudo find /var/www/timell/dist -type d -exec chmod 755 {} \;
          sudo find /var/www/timell/dist -type f -exec chmod 644 {} \;
          sudo chown -R github-runner:www-data /var/www/timell/dist

      - name: 7. Перезапуск Nginx
        run: sudo systemctl restart nginx.service
